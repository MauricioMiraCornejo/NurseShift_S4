<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <div class="avatar-container">
    <ion-avatar class="profile-avatar">
      <ion-icon name="person-circle-outline" class="avatar-large"></ion-icon>
    </ion-avatar>
    <h2>{{ nombre }}</h2>
    <ion-chip color="primary">{{ rol }}</ion-chip>
  </div>

  
  <ion-card>
    <ion-card-header>
      <ion-card-title>Datos Personales</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Nombre completo</ion-label>
        <ion-input type="text" [(ngModel)]="nombre"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Correo electrónico</ion-label>
        <ion-input type="email" [(ngModel)]="email" disabled="true"></ion-input>
        
      </ion-item>

      <ion-item>
        <ion-label position="floating">Teléfono</ion-label>
        <ion-input type="tel" [(ngModel)]="telefono"></ion-input>
      </ion-item>

      
      <ion-item>
        <ion-label>Recibir notificaciones</ion-label>
        <ion-toggle [(ngModel)]="notificaciones" slot="end"></ion-toggle>
      </ion-item>

      <ion-button expand="block" (click)="guardarCambios()" class="save-btn">
        Guardar Cambios
      </ion-button>
    </ion-card-content>
  </ion-card>

  
  <ion-button expand="block" color="danger" (click)="cerrarSesion()" fill="outline">
    Cerrar Sesión
  </ion-button>
</ion-content>
